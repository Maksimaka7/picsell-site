<svg class="cover-img" viewBox="0 0 780 390" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Agentic AI у FMCG — обкладинка статті</title>
<defs>
  <linearGradient id="cbg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#060608"/><stop offset="100%" stop-color="#0C0A14"/></linearGradient>
  <linearGradient id="purpleG" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#7B3FFF" stop-opacity="0.15"/><stop offset="100%" stop-color="#7B3FFF" stop-opacity="0"/></linearGradient>
  <clipPath id="cbr"><rect width="780" height="390" rx="12"/></clipPath>
</defs>
<g clip-path="url(#cbr)">
  <rect width="780" height="390" fill="url(#cbg)"/>
  <pattern id="cg" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse"><circle cx="1" cy="1" r="1" fill="#FFFFFF" opacity="0.04"/></pattern>
  <rect width="780" height="390" fill="url(#cg)"/>
  <ellipse cx="600" cy="180" rx="260" ry="200" fill="url(#purpleG)"/>

  <!-- AI Agent pipeline visual (right side) -->
  <g transform="translate(400, 40)">
    <!-- Main card -->
    <rect x="0" y="0" width="345" height="310" rx="14" fill="#0D0D0F" stroke="#1E1E24" stroke-width="0.8"/>
    <rect x="0" y="0" width="345" height="40" rx="14" fill="#111114"/>
    <rect x="0" y="28" width="345" height="12" fill="#111114"/>
    <rect x="16" y="10" width="80" height="5" rx="2" fill="#2A2A32"/>
    <rect x="16" y="20" width="55" height="4" rx="2" fill="#1A1A1E"/>
    <!-- Agent status -->
    <rect x="268" y="12" width="62" height="16" rx="8" fill="#7B3FFF18" stroke="#7B3FFF40" stroke-width="0.5"/>
    <circle cx="279" cy="20" r="3" fill="#A87FFF"/>
    <rect x="286" y="16" width="38" height="5" rx="2" fill="#7B3FFF60"/>

    <!-- Four agent nodes -->
    <!-- Node 1: Monitor -->
    <rect x="16" y="52" width="148" height="60" rx="8" fill="#111114" stroke="#1E1E24" stroke-width="0.5"/>
    <rect x="24" y="62" width="20" height="20" rx="5" fill="#7B3FFF18" stroke="#7B3FFF30" stroke-width="0.5"/>
    <text x="34" y="76" fill="#A87FFF" font-family="monospace" font-size="10" text-anchor="middle">👁</text>
    <rect x="50" y="62" width="80" height="5" rx="2" fill="#2A2A32"/>
    <rect x="50" y="71" width="60" height="4" rx="2" fill="#1A1A1E"/>
    <rect x="24" y="87" width="120" height="3" rx="1" fill="#1A1A1E"/>
    <rect x="24" y="93" width="90" height="3" rx="1" fill="#161618"/>

    <!-- Node 2: Analyze -->
    <rect x="180" y="52" width="148" height="60" rx="8" fill="#111114" stroke="#1E1E24" stroke-width="0.5"/>
    <rect x="188" y="62" width="20" height="20" rx="5" fill="#0057FF18" stroke="#0057FF30" stroke-width="0.5"/>
    <text x="198" y="76" fill="#3380FF" font-family="monospace" font-size="10" text-anchor="middle">🧠</text>
    <rect x="214" y="62" width="80" height="5" rx="2" fill="#2A2A32"/>
    <rect x="214" y="71" width="60" height="4" rx="2" fill="#1A1A1E"/>
    <rect x="188" y="87" width="120" height="3" rx="1" fill="#1A1A1E"/>
    <rect x="188" y="93" width="90" height="3" rx="1" fill="#161618"/>

    <!-- Arrow between nodes -->
    <line x1="164" y1="82" x2="180" y2="82" stroke="#7B3FFF" stroke-width="1" stroke-dasharray="2,2"/>
    <polygon points="178,79 182,82 178,85" fill="#7B3FFF"/>

    <!-- Node 3: Decide -->
    <rect x="16" y="128" width="148" height="60" rx="8" fill="#0D0D0F" stroke="#C8FF0030" stroke-width="0.8"/>
    <rect x="24" y="138" width="20" height="20" rx="5" fill="#C8FF0010" stroke="#C8FF0025" stroke-width="0.5"/>
    <text x="34" y="152" fill="#C8FF00" font-family="monospace" font-size="10" text-anchor="middle">⚡</text>
    <rect x="50" y="138" width="80" height="5" rx="2" fill="#2A2A32"/>
    <rect x="50" y="147" width="60" height="4" rx="2" fill="#1A1A1E"/>
    <rect x="24" y="162" width="80" height="4" rx="2" fill="#C8FF0018"/>
    <rect x="24" y="170" width="50" height="3" rx="1" fill="#1A1A1E"/>

    <!-- Node 4: Execute -->
    <rect x="180" y="128" width="148" height="60" rx="8" fill="#111114" stroke="#1E1E24" stroke-width="0.5"/>
    <rect x="188" y="138" width="20" height="20" rx="5" fill="#C8FF0010" stroke="#C8FF0025" stroke-width="0.5"/>
    <text x="198" y="152" fill="#C8FF00" font-family="monospace" font-size="10" text-anchor="middle">🔄</text>
    <rect x="214" y="138" width="80" height="5" rx="2" fill="#2A2A32"/>
    <rect x="214" y="147" width="60" height="4" rx="2" fill="#1A1A1E"/>
    <rect x="188" y="162" width="120" height="3" rx="1" fill="#1A1A1E"/>

    <!-- Vertical arrows -->
    <line x1="90" y1="112" x2="90" y2="128" stroke="#C8FF00" stroke-width="1"/>
    <polygon points="87,126 90,130 93,126" fill="#C8FF00"/>
    <line x1="254" y1="112" x2="254" y2="128" stroke="#1E1E24" stroke-width="1" stroke-dasharray="2,2"/>

    <!-- Middle connect arrow -->
    <line x1="164" y1="158" x2="180" y2="158" stroke="#C8FF00" stroke-width="1"/>
    <polygon points="178,155 182,158 178,161" fill="#C8FF00"/>

    <!-- Bottom: Results panel -->
    <rect x="16" y="204" width="312" height="90" rx="8" fill="#111114" stroke="#1E1E24" stroke-width="0.5"/>
    <rect x="24" y="214" width="60" height="4" rx="2" fill="#2A2A32"/>

    <!-- Auto-actions list -->
    <rect x="24" y="226" width="295" height="16" rx="4" fill="#C8FF0008" stroke="#C8FF0018" stroke-width="0.5"/>
    <circle cx="34" cy="234" r="4" fill="#C8FF00"/>
    <rect x="44" y="230" width="160" height="4" rx="2" fill="#C8FF0050"/>
    <text x="232" y="235" fill="#C8FF00" font-family="monospace" font-size="9" font-weight="700">AUTO ✓</text>

    <rect x="24" y="248" width="295" height="16" rx="4" fill="#0057FF06" stroke="#0057FF15" stroke-width="0.5"/>
    <circle cx="34" cy="256" r="4" fill="#3380FF"/>
    <rect x="44" y="252" width="140" height="4" rx="2" fill="#0057FF40"/>
    <text x="232" y="257" fill="#3380FF" font-family="monospace" font-size="9" font-weight="700">AUTO ✓</text>

    <rect x="24" y="270" width="295" height="16" rx="4" fill="#7B3FFF06" stroke="#7B3FFF15" stroke-width="0.5"/>
    <circle cx="34" cy="278" r="4" fill="#A87FFF"/>
    <rect x="44" y="274" width="120" height="4" rx="2" fill="#7B3FFF40"/>
    <text x="232" y="279" fill="#A87FFF" font-family="monospace" font-size="9" font-weight="700">LEARNING</text>
  </g>

  <!-- Left text -->
  <rect x="40" y="36" width="40" height="3" rx="1.5" fill="#7B3FFF" opacity="0.9"/>
  <rect x="40" y="48" width="110" height="22" rx="11" fill="#7B3FFF10" stroke="#7B3FFF30" stroke-width="0.5"/>
  <circle cx="54" cy="59" r="3" fill="#A87FFF"/>
  <rect x="62" y="55" width="76" height="5" rx="2.5" fill="#7B3FFF60"/>

  <text x="40" y="130" fill="#FFFFFF" font-family="Georgia, serif" font-size="30" font-weight="700" letter-spacing="-0.5">Agentic AI</text>
  <text x="40" y="165" fill="#FFFFFF" font-family="Georgia, serif" font-size="30" font-weight="700" letter-spacing="-0.5">у FMCG:</text>
  <text x="40" y="205" fill="#A87FFF" font-family="Georgia, serif" font-size="26" font-weight="700" letter-spacing="-0.3">кінець ери</text>
  <text x="40" y="240" fill="#C8FF00" font-family="Georgia, serif" font-size="28" font-weight="700" letter-spacing="-0.3">Excel-дистрибуції</text>

  <text x="40" y="280" fill="#A0A0B0" font-family="Arial, sans-serif" font-size="14">Тренди · AI · Квітень 2026 · 8 хв</text>
  <text x="40" y="300" fill="#A0A0B0" font-family="Arial, sans-serif" font-size="13">McKinsey: 78% компаній вже</text>
  <text x="40" y="316" fill="#A0A0B0" font-family="Arial, sans-serif" font-size="13">використовують AI в бізнесі</text>

  <text x="735" y="370" fill="#333338" font-family="Georgia, serif" font-size="13" font-weight="700" text-anchor="end">PICSELL+</text>
</g>
</svg>