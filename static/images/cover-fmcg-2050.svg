<svg style="width:100%;border-radius:var(--r4);" viewBox="0 0 780 400" role="img" xmlns="http://www.w3.org/2000/svg">
<title>FMCG 2050 — футуристична обкладинка</title>
<defs>
  <linearGradient id="fbg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#020210"/><stop offset="100%" stop-color="#08080F"/></linearGradient>
  <linearGradient id="fglow1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#7B3FFF" stop-opacity="0.2"/><stop offset="100%" stop-color="#7B3FFF" stop-opacity="0"/></linearGradient>
  <linearGradient id="fglow2" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#00E5FF" stop-opacity="0.1"/><stop offset="100%" stop-color="#00E5FF" stop-opacity="0"/></linearGradient>
  <clipPath id="fcbr"><rect width="780" height="400" rx="12"/></clipPath>
</defs>
<g clip-path="url(#fcbr)">
  <rect width="780" height="400" fill="url(#fbg)"/>
  <ellipse cx="280" cy="200" rx="300" ry="220" fill="url(#fglow1)"/>
  <ellipse cx="650" cy="300" rx="200" ry="160" fill="url(#fglow2)"/>

  <!-- Star field -->
  <circle cx="60" cy="40" r="1" fill="white" opacity="0.4"/>
  <circle cx="130" cy="15" r="1.5" fill="white" opacity="0.3"/>
  <circle cx="300" cy="25" r="1" fill="#C8FF00" opacity="0.5"/>
  <circle cx="500" cy="18" r="1" fill="white" opacity="0.3"/>
  <circle cx="680" cy="35" r="1" fill="#7B3FFF" opacity="0.6"/>
  <circle cx="750" cy="12" r="1" fill="white" opacity="0.4"/>
  <circle cx="420" cy="50" r="0.8" fill="#00E5FF" opacity="0.4"/>

  <!-- Future shelf visual (right side) -->
  <g transform="translate(420, 50)">
    <!-- Futuristic store frame -->
    <rect x="0" y="0" width="340" height="300" rx="16" fill="#08080F" stroke="#1A1A2E" stroke-width="0.8"/>
    <!-- Top holographic header -->
    <rect x="0" y="0" width="340" height="36" rx="16" fill="#0D0D1A"/>
    <rect x="0" y="24" width="340" height="12" fill="#0D0D1A"/>
    <!-- Year badge -->
    <rect x="16" y="10" width="50" height="16" rx="8" fill="#7B3FFF18" stroke="#7B3FFF40" stroke-width="0.5"/>
    <text x="41" y="21" fill="#A87FFF" font-family="monospace" font-size="9" text-anchor="middle" font-weight="700">2050</text>
    <rect x="74" y="13" width="60" height="4" rx="2" fill="#1A1A2E"/>
    <rect x="74" y="21" width="40" height="3" rx="1" fill="#141420"/>
    <!-- Holographic indicator right -->
    <rect x="268" y="10" width="58" height="16" rx="8" fill="#00E5FF08" stroke="#00E5FF25" stroke-width="0.5"/>
    <circle cx="279" cy="18" r="3" fill="#00E5FF" opacity="0.8"/>
    <rect x="287" y="14" width="32" height="5" rx="2" fill="#00E5FF40"/>

    <!-- Autonomous shelf 1 -->
    <rect x="16" y="50" width="308" height="65" rx="8" fill="#0D0D1A" stroke="#1A1A2E" stroke-width="0.5"/>
    <!-- Shelf products (holographic) -->
    <rect x="24" y="58" width="22" height="34" rx="3" fill="#7B3FFF30" stroke="#7B3FFF50" stroke-width="0.5"/>
    <rect x="50" y="58" width="22" height="34" rx="3" fill="#0057FF30" stroke="#0057FF50" stroke-width="0.5"/>
    <rect x="76" y="58" width="22" height="34" rx="3" fill="#7B3FFF30" stroke="#7B3FFF50" stroke-width="0.5"/>
    <rect x="102" y="58" width="22" height="34" rx="3" fill="#0057FF30" stroke="#0057FF50" stroke-width="0.5"/>
    <!-- OOS slot auto-refilling -->
    <rect x="128" y="58" width="22" height="34" rx="3" fill="#00E5FF06" stroke="#00E5FF" stroke-width="1" stroke-dasharray="2,1"/>
    <text x="139" y="78" fill="#00E5FF" font-family="monospace" font-size="7" text-anchor="middle">AUTO</text>
    <rect x="154" y="58" width="22" height="34" rx="3" fill="#7B3FFF30" stroke="#7B3FFF50" stroke-width="0.5"/>
    <rect x="180" y="58" width="22" height="34" rx="3" fill="#0057FF30" stroke="#0057FF50" stroke-width="0.5"/>
    <!-- Scanning beam -->
    <line x1="16" y1="75" x2="324" y2="75" stroke="#C8FF00" stroke-width="0.6" stroke-dasharray="3,2" opacity="0.5"/>
    <!-- Price tags (digital) -->
    <rect x="24" y="96" width="22" height="10" rx="2" fill="#C8FF0020" stroke="#C8FF0040" stroke-width="0.3"/>
    <rect x="50" y="96" width="22" height="10" rx="2" fill="#C8FF0020" stroke="#C8FF0040" stroke-width="0.3"/>
    <rect x="128" y="96" width="22" height="10" rx="2" fill="#C8FF0020" stroke="#C8FF0040" stroke-width="0.3"/>

    <!-- Robotic refill arm (animated look) -->
    <path d="M128 45 L128 35 Q128 30 133 30 L175 30" stroke="#00E5FF" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <circle cx="175" cy="30" r="5" fill="#00E5FF" opacity="0.6"/>
    <circle cx="175" cy="30" r="9" fill="#00E5FF" opacity="0.15"/>
    <text x="185" y="34" fill="#00E5FF" font-family="monospace" font-size="8">Robot refill</text>

    <!-- AI layer data overlay on shelf -->
    <rect x="16" y="120" width="308" height="20" rx="4" fill="#0D0D1A"/>
    <text x="24" y="133" fill="#A87FFF" font-family="monospace" font-size="8">AI: Real-time pricing &#x2022; Competitor scan &#x2022; Demand pred. 98.7%</text>

    <!-- Consumer with neural interface -->
    <g transform="translate(0, 150)">
      <!-- Person silhouette (simplified) -->
      <ellipse cx="180" cy="20" rx="12" ry="14" fill="#1A1A2E" stroke="#2A2A3E" stroke-width="0.5"/>
      <rect x="168" y="34" width="24" height="40" rx="4" fill="#1A1A2E" stroke="#2A2A3E" stroke-width="0.5"/>
      <!-- Neural interface glow around head -->
      <ellipse cx="180" cy="20" rx="18" ry="20" fill="none" stroke="#7B3FFF" stroke-width="0.8" stroke-dasharray="2,3" opacity="0.7"/>
      <ellipse cx="180" cy="20" rx="24" ry="26" fill="none" stroke="#7B3FFF" stroke-width="0.4" opacity="0.3"/>

      <!-- AR overlay lines from product to person -->
      <line x1="48" y1="0" x2="168" y2="20" stroke="#00E5FF" stroke-width="0.6" stroke-opacity="0.5" stroke-dasharray="2,2"/>
      <line x1="165" y1="0" x2="175" y2="20" stroke="#7B3FFF" stroke-width="0.6" stroke-opacity="0.5" stroke-dasharray="2,2"/>

      <!-- Purchase intent UI -->
      <rect x="200" y="5" width="120" height="55" rx="8" fill="#0D0D1A" stroke="#1A1A2E" stroke-width="0.5"/>
      <rect x="208" y="13" width="50" height="4" rx="2" fill="#2A2A3E"/>
      <rect x="208" y="21" width="100" height="3" rx="1" fill="#7B3FFF30"/>
      <text x="210" y="36" fill="#C8FF00" font-family="monospace" font-size="9" font-weight="700">Intent: 94%</text>
      <rect x="208" y="42" width="40" height="10" rx="5" fill="#C8FF0020" stroke="#C8FF0040" stroke-width="0.5"/>
      <text x="228" y="50" fill="#C8FF00" font-family="monospace" font-size="7" text-anchor="middle">AUTO-ORDER</text>
      <rect x="256" y="42" width="55" height="10" rx="5" fill="#7B3FFF20" stroke="#7B3FFF40" stroke-width="0.5"/>
      <text x="283" y="50" fill="#A87FFF" font-family="monospace" font-size="7" text-anchor="middle">NEURO-CONF</text>
    </g>

    <!-- Bottom timeline -->
    <rect x="16" y="270" width="308" height="24" rx="6" fill="#0D0D1A" stroke="#1A1A2E" stroke-width="0.5"/>
    <rect x="24" y="278" width="60" height="4" rx="2" fill="#7B3FFF" opacity="0.5"/>
    <rect x="90" y="278" width="80" height="4" rx="2" fill="#0057FF" opacity="0.5"/>
    <rect x="176" y="278" width="100" height="4" rx="2" fill="#00E5FF" opacity="0.4"/>
    <text x="24" y="286" fill="#50505A" font-family="monospace" font-size="7">AI scanned</text>
    <text x="90" y="286" fill="#50505A" font-family="monospace" font-size="7">Intent detected</text>
    <text x="176" y="286" fill="#50505A" font-family="monospace" font-size="7">Auto-purchased</text>
  </g>

  <!-- Left text content -->
  <rect x="40" y="36" width="40" height="3" rx="1.5" fill="#7B3FFF" opacity="0.9"/>
  <rect x="40" y="48" width="120" height="22" rx="11" fill="#7B3FFF10" stroke="#7B3FFF25" stroke-width="0.5"/>
  <circle cx="54" cy="59" r="3" fill="#A87FFF"/>
  <rect x="62" y="55" width="86" height="5" rx="2.5" fill="#7B3FFF50"/>

  <text x="40" y="130" fill="#FFFFFF" font-family="Georgia, serif" font-size="32" font-weight="700" letter-spacing="-0.5">FMCG</text>
  <text x="40" y="168" fill="#A87FFF" font-family="Georgia, serif" font-size="32" font-weight="700" letter-spacing="-0.5">у 2050:</text>
  <text x="40" y="210" fill="#FFFFFF" font-family="Georgia, serif" font-size="28" font-weight="700" letter-spacing="-0.3">полиця яка</text>
  <text x="40" y="248" fill="#C8FF00" font-family="Georgia, serif" font-size="28" font-weight="700" letter-spacing="-0.3">продає сама</text>
  <text x="40" y="286" fill="#C8FF00" font-family="Georgia, serif" font-size="28" font-weight="700" letter-spacing="-0.3">себе</text>

  <text x="40" y="324" fill="#A0A0C0" font-family="Arial, sans-serif" font-size="13">Футуристика &#183; 10 хв читання</text>
  <text x="40" y="342" fill="#A0A0C0" font-family="Arial, sans-serif" font-size="12">На основі реальних технологічних трендів</text>
  <text x="735" y="378" fill="#1A1A2E" font-family="Georgia, serif" font-size="13" font-weight="700" text-anchor="end">PICSELL+</text>
</g>
</svg>