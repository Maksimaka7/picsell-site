      - { name: "en-solutions-distributors", label: "For Distributors", file: "content/en/solutions-distributors/_index.md", fields: [{label: "Title", name: "title", widget: "string"}, {label: "SEO Title", name: "seoTitle", widget: "string"}, {label: "SEO Description", name: "seoDescription", widget: "text"}, {label: "OG Title", name: "ogTitle", widget: "string"}, {label: "OG Description", name: "ogDescription", widget: "text"}, {label: "Keywords", name: "keywords", widget: "string"}] }
      - { name: "en-solutions-horeca", label: "For HoReCa", file: "content/en/solutions-horeca/_index.md", fields: [{label: "Title", name: "title", widget: "string"}, {label: "SEO Title", name: "seoTitle", widget: "string"}, {label: "SEO Description", name: "seoDescription", widget: "text"}, {label: "OG Title", name: "ogTitle", widget: "string"}, {label: "OG Description", name: "ogDescription", widget: "text"}, {label: "Keywords", name: "keywords", widget: "string"}] }

  - name: "en-company"
    label: "🏢 Company (EN)"
    files:
      - { name: "en-pricing", label: "Pricing", file: "content/en/pricing/_index.md", fields: [{label: "Title", name: "title", widget: "string"}, {label: "SEO Title", name: "seoTitle", widget: "string"}, {label: "SEO Description", name: "seoDescription", widget: "text"}, {label: "OG Title", name: "ogTitle", widget: "string"}, {label: "OG Description", name: "ogDescription", widget: "text"}, {label: "Keywords", name: "keywords", widget: "string"}] }
      - { name: "en-case-studies", label: "Case Studies", file: "content/en/case-studies/_index.md", fields: [{label: "Title", name: "title", widget: "string"}, {label: "SEO Title", name: "seoTitle", widget: "string"}, {label: "SEO Description", name: "seoDescription", widget: "text"}, {label: "OG Title", name: "ogTitle", widget: "string"}, {label: "OG Description", name: "ogDescription", widget: "text"}, {label: "Keywords", name: "keywords", widget: "string"}] }
      - { name: "en-case-lactalis", label: "Lactalis Case Study", file: "content/en/case-lactalis/_index.md", fields: [{label: "Title", name: "title", widget: "string"}, {label: "SEO Title", name: "seoTitle", widget: "string"}, {label: "SEO Description", name: "seoDescription", widget: "text"}, {label: "OG Title", name: "ogTitle", widget: "string"}, {label: "OG Description", name: "ogDescription", widget: "text"}, {label: "Keywords", name: "keywords", widget: "string"}] }
