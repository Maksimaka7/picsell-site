      - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD" }
      - { label: "Author", name: "author", widget: "string", default: "PICSELL Team" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Categories", name: "categories", widget: "select", multiple: true, options: ["Vision AI", "SFA", "HoReCa", "Analytics", "FMCG", "Case Studies", "Product", "News", "Trends", "Futurism"] }
      - { label: "Tags", name: "tags", widget: "list", required: false }
      - { label: "Cover Image", name: "image", widget: "image", required: false }
      - { label: "SEO Title", name: "seoTitle", widget: "string", required: false }
      - { label: "SEO Description", name: "seoDescription", widget: "text", required: false }
      - { label: "Reading Time (min)", name: "readingTime", widget: "number", required: false }
      - { label: "Article Body", name: "body", widget: "markdown" }
