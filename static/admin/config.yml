  - name: "en-blog-posts"
    label: "📝 Blog Articles (EN)"
    label_singular: "Article"
    folder: "content/en/blog"
    create: true
    slug: "{{slug}}"
    filter: { field: "type", value: "blog" }
    sort: "date:desc"
    fields:
