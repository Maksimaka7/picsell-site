      - { name: "en-analytics", label: "Analytics", file: "content/en/analytics/_index.md", fields: [{label: "Title", name: "title", widget: "string"}, {label: "SEO Title", name: "seoTitle", widget: "string"}, {label: "SEO Description", name: "seoDescription", widget: "text"}, {label: "OG Title", name: "ogTitle", widget: "string"}, {label: "OG Description", name: "ogDescription", widget: "text"}, {label: "Keywords", name: "keywords", widget: "string"}] }
      - { name: "en-radar", label: "Radar", file: "content/en/radar/_index.md", fields: [{label: "Title", name: "title", widget: "string"}, {label: "SEO Title", name: "seoTitle", widget: "string"}, {label: "SEO Description", name: "seoDescription", widget: "text"}, {label: "OG Title", name: "ogTitle", widget: "string"}, {label: "OG Description", name: "ogDescription", widget: "text"}, {label: "Keywords", name: "keywords", widget: "string"}] }

