backend:
  name: git-gateway
  branch: main

locale: "uk"

media_folder: "static/images"
public_folder: "/images"

slug:
  encoding: "ascii"
  clean_accents: true

collections:

  # ════════════════════════════════════════
  # 🇺🇦 УКРАЇНСЬКА ВЕРСІЯ
  # ════════════════════════════════════════

  - name: "homepage"
    label: "🏠 Головна (UK)"
    files:
      - name: "index"
        label: "Головна"
        file: "content/uk/_index.md"
        fields:
          - { label: "Заголовок", name: "title", widget: "string" }
          - { label: "SEO Title", name: "seoTitle", widget: "string" }
          - { label: "SEO Description", name: "seoDescription", widget: "text" }
          - { label: "OG Title", name: "ogTitle", widget: "string" }
          - { label: "OG Description", name: "ogDescription", widget: "text" }
          - { label: "Ключові слова", name: "keywords", widget: "string" }

  - name: "products"
    label: "📦 Продукти (UK)"
    files:
      - { name: "vision-ai", label: "Vision AI", file: "content/uk/vision-ai/_index.md", fields: [{label: "Заголовок", name: "title", widget: "string"}, {label: "SEO Title", name: "seoTitle", widget: "string"}, {label: "SEO Description", name: "seoDescription", widget: "text"}, {label: "OG Title", name: "ogTitle", widget: "string"}, {label: "OG Description", name: "ogDescription", widget: "text"}, {label: "Ключові слова", name: "keywords", widget: "string"}] }
      - { name: "sales-app", label: "Sales App", file: "content/uk/sales-app/_index.md", fields: [{label: "Заголовок", name: "title", widget: "string"}, {label: "SEO Title", name: "seoTitle", widget: "string"}, {label: "SEO Description", name: "seoDescription", widget: "text"}, {label: "OG Title", name: "ogTitle", widget: "string"}, {label: "OG Description", name: "ogDescription", widget: "text"}, {label: "Ключові слова", name: "keywords", widget: "string"}] }
      - { name: "horeca", label: "HoReCa Intelligence", file: "content/uk/horeca/_index.md", fields: [{label: "Заголовок", name: "title", widget: "string"}, {label: "SEO Title", name: "seoTitle", widget: "string"}, {label: "SEO Description", name: "seoDescription", widget: "text"}, {label: "OG Title", name: "ogTitle", widget: "string"}, {label: "OG Description", name: "ogDescription", widget: "text"}, {label: "Ключові слова", name: "keywords", widget: "string"}] }
      - { name: "analytics", label: "Analytics", file: "content/uk/analytics/_index.md", fields: [{label: "Заголовок", name: "title", widget: "string"}, {label: "SEO Title", name: "seoTitle", widget: "string"}, {label: "SEO Description", name: "seoDescription", widget: "text"}, {label: "OG Title", name: "ogTitle", widget: "string"}, {label: "OG Description", name: "ogDescription", widget: "text"}, {label: "Ключові слова", name: "keywords", widget: "string"}] }
      - { name: "radar", label: "Radar", file: "content/uk/radar/_index.md", fields: [{label: "Заголовок", name: "title", widget: "string"}, {label: "SEO Title", name: "seoTitle", widget: "string"}, {label: "SEO Description", name: "seoDescription", widget: "text"}, {label: "OG Title", name: "ogTitle", widget: "string"}, {label: "OG Description", name: "ogDescription", widget: "text"}, {label: "Ключові слова", name: "keywords", widget: "string"}] }

  - name: "solutions"
    label: "🎯 Рішення (UK)"
    files:
      - { name: "solutions-brands", label: "Для виробників", file: "content/uk/solutions-brands/_index.md", fields: [{label: "Заголовок", name: "title", widget: "string"}, {label: "SEO Title", name: "seoTitle", widget: "string"}, {label: "SEO Description", name: "seoDescription", widget: "text"}, {label: "OG Title", name: "ogTitle", widget: "string"}, {label: "OG Description", name: "ogDescription", widget: "text"}, {label: "Ключові слова", name: "keywords", widget: "string"}] }
      - { name: "solutions-distributors", label: "Для дистриб'юторів", file: "content/uk/solutions-distributors/_index.md", fields: [{label: "Заголовок", name: "title", widget: "string"}, {label: "SEO Title", name: "seoTitle", widget: "string"}, {label: "SEO Description", name: "seoDescription", widget: "text"}, {label: "OG Title", name: "ogTitle", widget: "string"}, {label: "OG Description", name: "ogDescription", widget: "text"}, {label: "Ключові слова", name: "keywords", widget: "string"}] }
      - { name: "solutions-horeca", label: "Для HoReCa", file: "content/uk/solutions-horeca/_index.md", fields: [{label: "Заголовок", name: "title", widget: "string"}, {label: "SEO Title", name: "seoTitle", widget: "string"}, {label: "SEO Description", name: "seoDescription", widget: "text"}, {label: "OG Title", name: "ogTitle", widget: "string"}, {label: "OG Description", name: "ogDescription", widget: "text"}, {label: "Ключові слова", name: "keywords", widget: "string"}] }

  - name: "company"
    label: "🏢 Компанія (UK)"
    files:
      - { name: "pricing", label: "Ціни", file: "content/uk/pricing/_index.md", fields: [{label: "Заголовок", name: "title", widget: "string"}, {label: "SEO Title", name: "seoTitle", widget: "string"}, {label: "SEO Description", name: "seoDescription", widget: "text"}, {label: "OG Title", name: "ogTitle", widget: "string"}, {label: "OG Description", name: "ogDescription", widget: "text"}, {label: "Ключові слова", name: "keywords", widget: "string"}] }
      - { name: "case-studies", label: "Кейси", file: "content/uk/case-studies/_index.md", fields: [{label: "Заголовок", name: "title", widget: "string"}, {label: "SEO Title", name: "seoTitle", widget: "string"}, {label: "SEO Description", name: "seoDescription", widget: "text"}, {label: "OG Title", name: "ogTitle", widget: "string"}, {label: "OG Description", name: "ogDescription", widget: "text"}, {label: "Ключові слова", name: "keywords", widget: "string"}] }
      - { name: "case-lactalis", label: "Кейс Lactalis", file: "content/uk/case-lactalis/_index.md", fields: [{label: "Заголовок", name: "title", widget: "string"}, {label: "SEO Title", name: "seoTitle", widget: "string"}, {label: "SEO Description", name: "seoDescription", widget: "text"}, {label: "OG Title", name: "ogTitle", widget: "string"}, {label: "OG Description", name: "ogDescription", widget: "text"}, {label: "Ключові слова", name: "keywords", widget: "string"}] }
      - { name: "about", label: "Про нас", file: "content/uk/about/_index.md", fields: [{label: "Заголовок", name: "title", widget: "string"}, {label: "SEO Title", name: "seoTitle", widget: "string"}, {label: "SEO Description", name: "seoDescription", widget: "text"}, {label: "OG Title", name: "ogTitle", widget: "string"}, {label: "OG Description", name: "ogDescription", widget: "text"}, {label: "Ключові слова", name: "keywords", widget: "string"}] }
      - { name: "demo", label: "Демо", file: "content/uk/demo/_index.md", fields: [{label: "Заголовок", name: "title", widget: "string"}, {label: "SEO Title", name: "seoTitle", widget: "string"}, {label: "SEO Description", name: "seoDescription", widget: "text"}, {label: "OG Title", name: "ogTitle", widget: "string"}, {label: "OG Description", name: "ogDescription", widget: "text"}, {label: "Ключові слова", name: "keywords", widget: "string"}] }

  - name: "blog-posts"
    label: "📝 Статті блогу (UK)"
    label_singular: "Стаття"
    folder: "content/uk/blog"
    create: true
    slug: "{{slug}}"
    filter: { field: "type", value: "blog" }
    sort: "date:desc"
    fields:
      - { label: "Заголовок", name: "title", widget: "string" }
      - { label: "Дата", name: "date", widget: "datetime", format: "YYYY-MM-DD" }
      - { label: "Автор", name: "author", widget: "string", default: "PICSELL Team" }
      - { label: "Опис", name: "description", widget: "text" }
      - { label: "Категорії", name: "categories", widget: "select", multiple: true, options: ["Vision AI", "SFA", "HoReCa", "Аналітика", "FMCG", "Кейси", "Продукт", "Новини"] }
      - { label: "Теги", name: "tags", widget: "list", required: false }
      - { label: "Зображення", name: "image", widget: "image", required: false }
      - { label: "SEO Title", name: "seoTitle", widget: "string", required: false }
      - { label: "SEO Description", name: "seoDescription", widget: "text", required: false }
      - { label: "Текст статті", name: "body", widget: "markdown" }
      - { label: "Тип", name: "type", widget: "hidden", default: "blog" }

  # ════════════════════════════════════════
  # 🇺🇸 ENGLISH VERSION
  # ════════════════════════════════════════

  - name: "en-homepage"
    label: "🏠 Homepage (EN)"
    files:
      - name: "en-index"
        label: "Homepage"
        file: "content/en/_index.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "SEO Title", name: "seoTitle", widget: "string" }
          - { label: "SEO Description", name: "seoDescription", widget: "text" }
          - { label: "OG Title", name: "ogTitle", widget: "string" }
          - { label: "OG Description", name: "ogDescription", widget: "text" }
          - { label: "Keywords", name: "keywords", widget: "string" }

  - name: "en-products"
    label: "📦 Products (EN)"
    files:
