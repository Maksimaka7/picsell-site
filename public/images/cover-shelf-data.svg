<svg style="width:100%;border-radius:var(--r4);" viewBox="0 0 780 380" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Shelf data як конкурентна перевага</title>
<defs>
  <linearGradient id="sbg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#060608"/><stop offset="100%" stop-color="#0A0E08"/></linearGradient>
  <linearGradient id="sneon" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#C8FF00" stop-opacity="0.12"/><stop offset="100%" stop-color="#0057FF" stop-opacity="0.06"/></linearGradient>
  <clipPath id="scbr"><rect width="780" height="380" rx="12"/></clipPath>
</defs>
<g clip-path="url(#scbr)">
  <rect width="780" height="380" fill="url(#sbg)"/>
  <pattern id="sg" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse"><circle cx="1" cy="1" r="1" fill="#FFFFFF" opacity="0.04"/></pattern>
  <rect width="780" height="380" fill="url(#sg)"/>
  <ellipse cx="580" cy="180" rx="280" ry="200" fill="url(#sneon)"/>
  <!-- Right: Growing chart of shelf data value -->
  <g transform="translate(390, 40)">
    <rect x="0" y="0" width="355" height="300" rx="14" fill="#0D0D0F" stroke="#1E1E24" stroke-width="0.8"/>
    <rect x="0" y="0" width="355" height="40" rx="14" fill="#111114"/>
    <rect x="0" y="28" width="355" height="12" fill="#111114"/>
    <rect x="16" y="10" width="100" height="5" rx="2" fill="#2A2A32"/>
    <rect x="16" y="20" width="70" height="4" rx="2" fill="#1A1A1E"/>
    <!-- Value badge -->
    <rect x="270" y="12" width="68" height="16" rx="8" fill="#C8FF0015" stroke="#C8FF0040" stroke-width="0.5"/>
    <text x="304" y="23" fill="#C8FF00" font-family="monospace" font-size="10" text-anchor="middle" font-weight="700">$164B 2030</text>
    <!-- Chart area -->
    <line x1="30" y1="240" x2="330" y2="240" stroke="#1A1A1E" stroke-width="0.8"/>
    <line x1="30" y1="200" x2="330" y2="200" stroke="#1A1A1E" stroke-width="0.5" stroke-dasharray="2,3"/>
    <line x1="30" y1="160" x2="330" y2="160" stroke="#1A1A1E" stroke-width="0.5" stroke-dasharray="2,3"/>
    <line x1="30" y1="120" x2="330" y2="120" stroke="#1A1A1E" stroke-width="0.5" stroke-dasharray="2,3"/>
    <line x1="30" y1="80" x2="330" y2="80" stroke="#1A1A1E" stroke-width="0.5" stroke-dasharray="2,3"/>
    <!-- Y labels -->
    <text x="24" y="244" fill="#50505A" font-family="monospace" font-size="8" text-anchor="end">0</text>
    <text x="24" y="204" fill="#50505A" font-family="monospace" font-size="8" text-anchor="end">$40B</text>
    <text x="24" y="164" fill="#50505A" font-family="monospace" font-size="8" text-anchor="end">$80B</text>
    <text x="24" y="124" fill="#50505A" font-family="monospace" font-size="8" text-anchor="end">$120B</text>
    <text x="24" y="84" fill="#50505A" font-family="monospace" font-size="8" text-anchor="end">$164B</text>
    <!-- X labels -->
    <text x="50" y="254" fill="#50505A" font-family="monospace" font-size="8" text-anchor="middle">2024</text>
    <text x="110" y="254" fill="#50505A" font-family="monospace" font-size="8" text-anchor="middle">2025</text>
    <text x="170" y="254" fill="#50505A" font-family="monospace" font-size="8" text-anchor="middle">2026</text>
    <text x="230" y="254" fill="#50505A" font-family="monospace" font-size="8" text-anchor="middle">2028</text>
    <text x="310" y="254" fill="#C8FF00" font-family="monospace" font-size="8" text-anchor="middle" font-weight="700">2030</text>
    <!-- Area fill under curve -->
    <path d="M50 228 C80 220 110 210 140 195 C170 178 200 158 230 138 C260 115 280 95 310 78 L310 240 L50 240 Z" fill="#C8FF00" opacity="0.06"/>
    <!-- Growth line -->
    <path d="M50 228 C80 220 110 210 140 195 C170 178 200 158 230 138 C260 115 280 95 310 78" stroke="#C8FF00" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Data points -->
    <circle cx="50" cy="228" r="4" fill="#C8FF00"/>
    <circle cx="110" cy="210" r="4" fill="#C8FF00"/>
    <circle cx="170" cy="188" r="4" fill="#C8FF00"/>
    <circle cx="230" cy="138" r="4" fill="#C8FF00"/>
    <circle cx="310" cy="78" r="6" fill="#C8FF00"/>
    <circle cx="310" cy="78" r="10" fill="#C8FF00" opacity="0.2"/>
    <!-- Annotation -->
    <line x1="310" y1="78" x2="310" y2="65" stroke="#C8FF00" stroke-width="0.8"/>
    <rect x="268" y="52" width="80" height="14" rx="4" fill="#C8FF0018" stroke="#C8FF0030" stroke-width="0.5"/>
    <text x="308" y="62" fill="#C8FF00" font-family="monospace" font-size="9" text-anchor="middle" font-weight="700">+32% CAGR</text>
    <!-- Second line: advertising budgets (flat/slower growth) -->
    <path d="M50 215 C110 208 170 205 230 200 C270 196 295 192 310 188" stroke="#FF003D" stroke-width="1.5" fill="none" stroke-dasharray="3,2" stroke-opacity="0.7"/>
    <circle cx="50" cy="215" r="3" fill="#FF003D" opacity="0.7"/>
    <circle cx="310" cy="188" r="4" fill="#FF003D" opacity="0.7"/>
    <!-- Legend -->
    <line x1="30" y1="272" x2="50" y2="272" stroke="#C8FF00" stroke-width="2"/>
    <rect x="56" y="267" width="80" height="5" rx="2" fill="#2A2A32"/>
    <rect x="56" y="275" width="60" height="3" rx="1" fill="#1A1A1E"/>
    <line x1="175" y1="272" x2="195" y2="272" stroke="#FF003D" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.7"/>
    <rect x="200" y="267" width="80" height="5" rx="2" fill="#2A2A32"/>
    <rect x="200" y="275" width="60" height="3" rx="1" fill="#1A1A1E"/>
  </g>
  <!-- Left text -->
  <rect x="40" y="36" width="40" height="3" rx="1.5" fill="#C8FF00" opacity="0.9"/>
  <rect x="40" y="48" width="115" height="22" rx="11" fill="#C8FF0010" stroke="#C8FF0030" stroke-width="0.5"/>
  <circle cx="54" cy="59" r="3" fill="#C8FF00"/>
  <rect x="62" y="55" width="80" height="5" rx="2.5" fill="#C8FF0050"/>
  <text x="40" y="126" fill="#FFFFFF" font-family="Georgia, serif" font-size="28" font-weight="700" letter-spacing="-0.4">&#1063;&#1086;&#1084;&#1091; shelf data</text>
  <text x="40" y="160" fill="#C8FF00" font-family="Georgia, serif" font-size="30" font-weight="700" letter-spacing="-0.5">&#1089;&#1090;&#1072;&#1085;&#1077;</text>
  <text x="40" y="194" fill="#FFFFFF" font-family="Georgia, serif" font-size="28" font-weight="700" letter-spacing="-0.4">&#1076;&#1086;&#1088;&#1086;&#1078;&#1095;&#1077; &#1085;&#1110;&#1078;</text>
  <text x="40" y="230" fill="#0057FF" font-family="Georgia, serif" font-size="26" font-weight="700" letter-spacing="-0.3">&#1088;&#1077;&#1082;&#1083;&#1072;&#1084;&#1085;&#1080;&#1081;</text>
  <text x="40" y="264" fill="#0057FF" font-family="Georgia, serif" font-size="26" font-weight="700" letter-spacing="-0.3">&#1073;&#1102;&#1076;&#1078;&#1077;&#1090;</text>
  <text x="40" y="300" fill="#A0A0B0" font-family="Arial, sans-serif" font-size="13">&#1058;&#1088;&#1077;&#1085;&#1076;&#1080; &#183; Retail Data &#183; 7 &#1093;&#1074;</text>
  <text x="735" y="358" fill="#333338" font-family="Georgia, serif" font-size="13" font-weight="700" text-anchor="end">PICSELL+</text>
</g>
</svg>