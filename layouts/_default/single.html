{{ define "main" }}
<article style="padding-top:calc(72px + var(--s6));background:var(--bg1);min-height:80vh;">
  <div class="container" style="max-width:720px;">
    <h1 style="font-family:'Geologica',sans-serif;font-weight:800;font-size:clamp(28px,4vw,42px);margin-bottom:var(--s4);padding-top:var(--s5);">{{ .Title }}</h1>
    <div style="color:var(--t2);font-size:16px;line-height:1.75;">
      {{ .Content }}
    </div>
  </div>
</article>
{{ end }}
