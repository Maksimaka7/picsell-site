<!DOCTYPE html>
<html lang="{{ .Language.Lang }}">
<head>
{{ partial "head.html" . }}
{{ block "head-extra" . }}{{ end }}
</head>
<body style="overflow-x:hidden;">
<!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-K4T96TN5"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<!-- End Google Tag Manager (noscript) -->
<!-- Netlify Forms detection (hidden) -->
<form name="demo-request" netlify netlify-honeypot="bot-field" hidden>
  <input type="text" name="name">
  <input type="text" name="company">
  <select name="role"></select>
  <select name="agents"></select>
  <input type="tel" name="phone">
  <input type="email" name="email">
  <input type="text" name="bot-field">
</form>
<form name="homepage-demo" netlify netlify-honeypot="bot-field" hidden>
  <input type="text" name="name">
  <input type="text" name="company">
  <select name="role"></select>
  <input type="tel" name="phone">
  <input type="email" name="email">
  <input type="text" name="bot-field">
</form>
<form name="subscribe" netlify hidden>
  <input type="email" name="email">
</form>
{{ partial "header.html" . }}
<main>
{{ block "main" . }}{{ end }}
</main>
{{ partial "footer.html" . }}
{{ block "scripts" . }}{{ end }}
{{ partial "analytics-events.html" . }}
<!-- Netlify Identity Widget for CMS -->
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<script>
if(window.netlifyIdentity){window.netlifyIdentity.on("init",function(u){if(!u){window.netlifyIdentity.on("login",function(){document.location.href="/admin/"})}})}
</script>
</body>
</html>
