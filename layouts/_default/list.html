{{ define "main" }}
<section class="section" style="padding-top:calc(72px + var(--s7));background:var(--bg1);min-height:80vh;">
  <div class="container">
    <h1 style="font-family:'Geologica',sans-serif;font-weight:800;font-size:clamp(28px,4vw,42px);margin-bottom:var(--s4);">{{ .Title }}</h1>
    {{ .Content }}
    {{ range .Pages }}
    <div style="margin-bottom:var(--s3);">
      <a href="{{ .Permalink }}" style="color:var(--blue3);font-size:17px;font-weight:600;">{{ .Title }}</a>
    </div>
    {{ end }}
  </div>
</section>
{{ end }}
