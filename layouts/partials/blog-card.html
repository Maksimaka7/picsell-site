<article class="blog-card reveal">
  <div class="blog-card-img">📰</div>
  <div class="blog-card-body">
    <div class="blog-card-date">{{ .Date.Format "02.01.2006" }}</div>
    <h2 class="blog-card-title">
      <a href="{{ .Permalink }}" style="color:inherit;">{{ .Title }}</a>
    </h2>
    {{ if .Description }}
    <p class="blog-card-excerpt">{{ .Description }}</p>
    {{ else }}
    <p class="blog-card-excerpt">{{ .Summary | truncate 120 }}</p>
    {{ end }}
    {{ if .Params.tags }}
    <div class="blog-card-tags">
      {{ range .Params.tags }}
      <span class="blog-tag">{{ . }}</span>
      {{ end }}
    </div>
    {{ end }}
    <a href="{{ .Permalink }}" class="blog-card-link">Читати далі →</a>
  </div>
</article>
