<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} — PICSELL{{ end }}</title>
<meta name="description" content="{{ if .Description }}{{ .Description }}{{ else }}{{ .Site.Params.description }}{{ end }}"/>
<meta name="keywords" content="FMCG платформа, Vision AI полиця, SFA система, HoReCa моніторинг, розпізнавання SKU, OOS detection, Perfect Store"/>
<meta property="og:type" content="website"/>
<meta property="og:url" content="{{ .Permalink }}"/>
<meta property="og:title" content="{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} — PICSELL{{ end }}"/>
<meta property="og:description" content="{{ if .Description }}{{ .Description }}{{ else }}{{ .Site.Params.description }}{{ end }}"/>
<meta property="og:locale" content="uk_UA"/>
<link rel="canonical" href="{{ .Permalink }}"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Geologica:wght@400;500;600;700;800;900&family=Orbitron:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230057FF'/%3E%3Cpath d='M4 24V10h10c1 0 2 .4 2.7 1.1.7.7 1.1 1.6 1.1 2.7s-.4 2-.9 2.7c-.6.7-1.3 1.1-2.2 1.1H5.5V24H4zm10-11H5.5v4H14c.5 0 .9-.2 1.3-.5.3-.4.5-.8.5-1.3s-.2-.9-.5-1.3c-.4-.5-.8-.9-1.3-.9z' fill='white'/%3E%3Cpath d='M27 9.5C26.4 8.5 26.3 7.2 26 6c-.3 1.2-.4 2.5-1 3.5-.9 1.6-2.8 1.8-4.5 2.2 1.7.4 3.5.7 4.5 2.3.6 1 .7 2.3 1 3.5.3-1.2.4-2.5 1-3.5.9-1.6 2.8-1.8 4.5-2.2-1.7-.4-3.5-.7-4.5-2.3z' fill='%23C8FF00'/%3E%3C/svg%3E"/>
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<style>

/* ═══════════════════════════ DESIGN SYSTEM ═══════════════════════════ */
:root{
  --bg0:#060608;--bg1:#0D0D0F;--bg2:#111114;--bg3:#1A1A1E;--bg4:#222228;
  --border:#1E1E24;--border-b:rgba(0,87,255,.22);--border-glow:rgba(0,87,255,.5);
  --blue:#0057FF;--blue2:#0066FF;--blue3:#3380FF;--cyan:#00D4FF;
  --neon:#C8FF00;--red:#FF003D;--orange:#FF5C00;--green:#7ADE05;
  --t1:#FFFFFF;--t2:#A0A0B0;--t3:#50505A;
  --grad-blue:linear-gradient(135deg,#0057FF 0%,#00B4FF 100%);
  --s1:8px;--s2:16px;--s3:24px;--s4:32px;--s5:48px;--s6:64px;--s7:96px;--s8:128px;
  --r1:4px;--r2:8px;--r3:12px;--r4:16px;--r5:24px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased;}
body{background:var(--bg1);color:var(--t1);font-family:'Inter',sans-serif;font-size:16px;line-height:1.6;overflow-x:hidden;}
a{text-decoration:none;color:inherit;}
ul{list-style:none;}

/* ── TYPOGRAPHY ── */
.geo{font-family:'Geologica',sans-serif;}
.orb{font-family:'Orbitron',sans-serif;}
h1,h2,h3,h4{font-family:'Geologica',sans-serif;line-height:1.08;letter-spacing:-0.025em;}
.tag{font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--blue);}
.badge-neon{display:inline-flex;align-items:center;gap:6px;font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;background:rgba(200,255,0,.08);color:var(--neon);padding:5px 14px;border-radius:999px;border:1px solid rgba(200,255,0,.22);}
.badge-blue{display:inline-flex;align-items:center;gap:6px;font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;background:rgba(0,87,255,.1);color:#7AACFF;padding:5px 14px;border-radius:999px;border:1px solid rgba(0,87,255,.25);}

/* ── LAYOUT ── */
.container{max-width:1240px;margin:0 auto;padding:0 var(--s3);}
.section{padding:var(--s7) 0;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:var(--s5);align-items:center;}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--s3);}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--s3);}
.grid-5{display:grid;grid-template-columns:repeat(5,1fr);gap:var(--s3);}
.sec-head{text-align:center;margin-bottom:var(--s6);}
.sec-head .tag{display:block;margin-bottom:var(--s2);}
.sec-head h2{font-size:clamp(30px,4vw,52px);font-weight:800;margin-bottom:var(--s2);}
.sec-head p{color:var(--t2);font-size:17px;max-width:580px;margin:0 auto;line-height:1.65;}
.highlight{color:var(--blue);}
.hl-neon{color:var(--neon);}
.t2{color:var(--t2);}
.star-svg{display:inline-block;width:18px;height:18px;vertical-align:middle;margin:0 4px;}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:8px;font-family:'Geologica',sans-serif;font-weight:600;font-size:15px;padding:14px 28px;border-radius:var(--r2);transition:all .25s;border:none;cursor:pointer;text-decoration:none;white-space:nowrap;}
.btn-p{background:var(--blue);color:#fff;box-shadow:0 0 24px rgba(0,87,255,.4);}
.btn-p:hover{background:var(--blue2);transform:translateY(-2px);box-shadow:0 0 40px rgba(0,87,255,.6);}
.btn-s{background:transparent;color:#fff;border:1px solid var(--blue);}
.btn-s:hover{background:rgba(0,87,255,.1);transform:translateY(-2px);}
.btn-g{background:transparent;color:var(--t2);border:1px solid var(--border);}
.btn-g:hover{color:#fff;border-color:rgba(255,255,255,.3);}
.btn-neon{background:var(--neon);color:#080808;font-weight:700;box-shadow:0 0 24px rgba(200,255,0,.3);}
.btn-neon:hover{transform:translateY(-2px);box-shadow:0 0 40px rgba(200,255,0,.5);}
.btn-sm{padding:9px 18px;font-size:13px;}
.btn-lg{padding:18px 36px;font-size:17px;}
.btn-full{width:100%;justify-content:center;}

/* ── CARDS ── */
.card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r3);padding:var(--s4);transition:border-color .3s,box-shadow .3s,transform .3s;}
.card:hover{border-color:rgba(0,87,255,.3);box-shadow:0 8px 40px rgba(0,87,255,.08);}
.card-lift:hover{transform:translateY(-4px);}
.card-glow:hover{box-shadow:0 0 40px rgba(0,87,255,.2);}

/* ═══════════════════════════ HEADER ═══════════════════════════ */
#header{position:fixed;top:0;left:0;right:0;z-index:1000;background:rgba(8,8,10,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);transition:all .3s;}
#header.scrolled{background:rgba(8,8,10,.96);border-bottom-color:rgba(0,87,255,.18);}
.header-inner{display:flex;align-items:center;justify-content:space-between;height:72px;}
.logo{font-family:'Geologica',sans-serif;font-weight:900;font-size:21px;letter-spacing:-.03em;display:flex;align-items:center;}
.logo-plus{color:var(--neon);}
.nav-wrap{display:flex;align-items:center;gap:var(--s2);}
.nav-item{position:relative;}
.nav-link{font-size:14px;font-weight:500;color:var(--t2);padding:8px 12px;border-radius:var(--r2);display:inline-flex;align-items:center;gap:4px;transition:color .2s,background .2s;cursor:pointer;}
.nav-link:hover,.nav-link.active{color:var(--t1);background:rgba(255,255,255,.04);}
.nav-chevron{font-size:10px;transition:transform .2s;}
.nav-item:hover .nav-chevron{transform:rotate(180deg);}
.dropdown{position:absolute;top:calc(100%+8px);left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--border);border-radius:var(--r3);padding:8px;min-width:230px;opacity:0;visibility:hidden;pointer-events:none;transition:all .2s;box-shadow:0 20px 60px rgba(0,0,0,.7);}
.nav-item:hover .dropdown{opacity:1;visibility:visible;pointer-events:all;}
.dd-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--r2);color:var(--t2);font-size:14px;transition:background .15s,color .15s;}
.dd-item:hover{background:rgba(0,87,255,.08);color:var(--t1);}
.dd-icon{font-size:17px;width:26px;text-align:center;}
.dd-text{}
.dd-text strong{display:block;font-size:13px;font-weight:600;color:var(--t1);}
.dd-text span{display:block;font-size:11px;color:var(--t2);margin-top:1px;}
.nav-r{display:flex;align-items:center;gap:var(--s2);}
.hamburger{display:none;flex-direction:column;gap:5px;padding:5px;background:none;border:none;cursor:pointer;}
.hamburger span{display:block;width:22px;height:2px;background:var(--t1);border-radius:2px;transition:all .3s;}
.hamburger.open span:nth-child(1){transform:rotate(45deg) translate(5px,5px);}
.hamburger.open span:nth-child(2){opacity:0;}
.hamburger.open span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px);}
.mobile-nav{display:none;position:fixed;top:72px;left:0;right:0;bottom:0;background:rgba(6,6,8,.98);backdrop-filter:blur(20px);flex-direction:column;align-items:center;justify-content:center;gap:var(--s3);z-index:999;}
.mobile-nav.open{display:flex;}
.mobile-nav a{font-family:'Geologica',sans-serif;font-size:26px;font-weight:700;color:var(--t1);transition:color .2s;}
.mobile-nav a:hover{color:var(--blue);}

/* ═══════════════════════════ HERO ═══════════════════════════ */
#hero{position:relative;min-height:100vh;display:flex;align-items:center;padding-top:72px;overflow:hidden;}
.hero-bg{position:absolute;inset:0;pointer-events:none;}
.dot-grid{position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,.055) 1px,transparent 1px);background-size:34px 34px;}
.glow1{position:absolute;top:-15%;left:50%;transform:translateX(-50%);width:1000px;height:700px;background:radial-gradient(ellipse,rgba(0,87,255,.16) 0%,transparent 65%);filter:blur(50px);}
.glow2{position:absolute;bottom:-10%;right:-5%;width:600px;height:600px;background:radial-gradient(circle,rgba(0,212,255,.06) 0%,transparent 60%);filter:blur(70px);}
.glow3{position:absolute;top:30%;left:-5%;width:400px;height:400px;background:radial-gradient(circle,rgba(200,255,0,.04) 0%,transparent 60%);filter:blur(60px);}
.noise{position:absolute;inset:0;opacity:.022;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:200px;}

.hero-content{position:relative;z-index:2;display:grid;grid-template-columns:1fr 1fr;gap:var(--s6);align-items:center;padding:var(--s7) 0;}
.hero-left{}
.hero-eyebrow{display:flex;align-items:center;gap:var(--s2);margin-bottom:var(--s4);}
.hero-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(200,255,0,.07);border:1px solid rgba(200,255,0,.2);border-radius:999px;padding:6px 14px 6px 8px;}
.badge-dot{width:6px;height:6px;background:var(--neon);border-radius:50%;animation:pulseDot 2s ease-in-out infinite;}
@keyframes pulseDot{0%,100%{box-shadow:0 0 0 0 rgba(200,255,0,.6);}50%{box-shadow:0 0 0 6px rgba(200,255,0,0);}}
.badge-text{font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--neon);}

.hero-h1{font-size:clamp(38px,4.8vw,68px);font-weight:900;line-height:1.06;letter-spacing:-.03em;margin-bottom:var(--s3);}
.hero-sub{font-size:17px;color:var(--t2);line-height:1.7;margin-bottom:var(--s5);max-width:520px;}
.hero-ctas{display:flex;gap:var(--s2);flex-wrap:wrap;margin-bottom:var(--s5);}
.hero-trust{display:flex;align-items:center;gap:var(--s2);}
.trust-avatars{display:flex;}
.trust-avatar{width:32px;height:32px;border-radius:50%;border:2px solid var(--bg1);background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;margin-left:-8px;color:var(--blue);}
.trust-avatar:first-child{margin-left:0;}
.trust-text{font-size:13px;color:var(--t2);}
.trust-text strong{color:var(--t1);}

/* Hero right — animated dashboard */
.hero-right{position:relative;}
.hero-dashboard{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r4);overflow:hidden;box-shadow:0 0 80px rgba(0,87,255,.15),0 40px 80px rgba(0,0,0,.5);}
.dash-header{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;}
.dash-dots{display:flex;gap:6px;}
.dash-dot{width:10px;height:10px;border-radius:50%;}
.dash-dot-r{background:#FF5F57;} .dash-dot-y{background:#FEBC2E;} .dash-dot-g{background:#28C840;}
.dash-title{font-family:'Orbitron',sans-serif;font-size:9px;font-weight:700;letter-spacing:.14em;color:var(--t2);text-transform:uppercase;}
.dash-status{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--neon);}
.dash-status-dot{width:6px;height:6px;background:var(--neon);border-radius:50%;animation:pulseDot 1.5s ease-in-out infinite;}
.dash-body{padding:var(--s3);}
.kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--s2);margin-bottom:var(--s3);}
.kpi-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r3);padding:14px;}
.kpi-label{font-family:'Orbitron',sans-serif;font-size:8px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--t2);margin-bottom:6px;}
.kpi-val{font-family:'Geologica',sans-serif;font-weight:900;font-size:22px;letter-spacing:-.02em;margin-bottom:4px;}
.kpi-val.blue{color:var(--blue3);}
.kpi-val.neon{color:var(--neon);}
.kpi-val.red{color:var(--red);}
.kpi-delta{font-size:11px;font-weight:600;}
.kpi-delta.up{color:var(--neon);}
.kpi-delta.down{color:var(--red);}
.shelf-vis{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r3);padding:var(--s2);position:relative;overflow:hidden;}
.shelf-label{font-family:'Orbitron',sans-serif;font-size:8px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--t2);margin-bottom:10px;}
.shelf-row{display:flex;gap:5px;align-items:flex-end;margin-bottom:5px;}
.sku{border-radius:4px;border:1px solid transparent;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:4px 2px;font-size:6px;font-weight:700;flex:1;}
.sku-p{background:rgba(0,87,255,.18);border-color:rgba(0,87,255,.4);color:#7AACFF;height:55px;}
.sku-p2{background:rgba(0,87,255,.12);border-color:rgba(0,87,255,.3);color:#7AACFF;height:45px;}
.sku-p3{background:rgba(0,87,255,.22);border-color:rgba(0,87,255,.45);color:#7AACFF;height:65px;}
.sku-c{background:rgba(80,80,90,.3);border-color:rgba(80,80,90,.4);color:var(--t2);height:40px;}
.sku-oos{background:rgba(255,0,61,.06);border:1.5px dashed rgba(255,0,61,.4);height:50px;position:relative;}
.oos-label{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Orbitron',sans-serif;font-size:7px;font-weight:700;color:var(--red);white-space:nowrap;letter-spacing:.05em;}
.ai-scan{position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--blue),var(--cyan),var(--blue),transparent);animation:scanLine 2.5s linear infinite;opacity:.7;}
@keyframes scanLine{0%{top:30px;}100%{top:calc(100% - 10px);}}
.ai-bbox{position:absolute;border:1.5px solid var(--blue);border-radius:3px;animation:bboxBlink 2s ease-in-out infinite;}
.ai-bbox-oos{border-color:var(--red);animation:bboxBlink 1.5s ease-in-out infinite;}
@keyframes bboxBlink{0%,100%{opacity:1;}50%{opacity:.2;}}
.ai-tag{position:absolute;top:-17px;left:0;background:var(--blue);color:#fff;font-family:'Orbitron',sans-serif;font-size:7px;font-weight:700;padding:2px 6px;border-radius:2px;white-space:nowrap;}
.ai-tag-r{background:var(--red);}
.alert-row{margin-top:var(--s2);}
.alert-item{display:flex;align-items:center;gap:8px;background:rgba(255,0,61,.06);border:1px solid rgba(255,0,61,.15);border-radius:var(--r2);padding:8px 12px;font-size:11px;color:var(--t2);}
.alert-dot{width:6px;height:6px;background:var(--red);border-radius:50%;flex-shrink:0;animation:pulseDot 1.5s ease-in-out infinite;}
.alert-neon{background:rgba(200,255,0,.05);border-color:rgba(200,255,0,.15);}
.alert-neon .alert-dot{background:var(--neon);}

.hero-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:var(--r3);overflow:hidden;margin-top:var(--s3);}
.hstat{background:var(--bg3);padding:var(--s3);text-align:center;}
.hstat-val{font-family:'Geologica',sans-serif;font-weight:900;font-size:clamp(22px,3vw,34px);letter-spacing:-.02em;color:var(--t1);line-height:1;}
.hstat-val .acc{color:var(--blue);}
.hstat-label{font-size:12px;color:var(--t2);margin-top:5px;}

/* Logos strip */
.logos-strip{padding:var(--s5) 0;background:var(--bg2);border-top:1px solid var(--border);border-bottom:1px solid var(--border);}
.logos-inner{display:flex;align-items:center;justify-content:center;gap:var(--s6);flex-wrap:wrap;}
.logo-client{font-family:'Geologica',sans-serif;font-weight:700;font-size:17px;color:var(--t3);letter-spacing:.04em;padding:8px 20px;border:1px solid var(--border);border-radius:var(--r2);transition:all .3s;}
.logo-client:hover{color:var(--t2);border-color:rgba(0,87,255,.3);background:rgba(0,87,255,.05);}
.logos-pre{font-family:'Orbitron',sans-serif;font-size:9px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--t3);margin-right:var(--s3);}

/* ═══════════════════════════ PAIN SECTION ═══════════════════════════ */
#pain{background:var(--bg2);}
.pain-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:var(--s3);}
.pain-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r3);padding:var(--s4);position:relative;overflow:hidden;transition:all .3s;}
.pain-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--red);opacity:.5;}
.pain-card:hover{border-color:rgba(255,0,61,.3);box-shadow:0 8px 40px rgba(255,0,61,.08);}
.pain-card:hover::before{opacity:1;}
.pain-icon{width:48px;height:48px;background:rgba(255,0,61,.08);border:1px solid rgba(255,0,61,.15);border-radius:var(--r3);display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:var(--s3);}
.pain-card h3{font-size:17px;font-weight:700;margin-bottom:var(--s2);line-height:1.35;font-family:'Geologica',sans-serif;}
.pain-card p{color:var(--t2);font-size:14px;line-height:1.65;}

/* ═══════════════════════════ HOW IT WORKS ═══════════════════════════ */
#how{background:var(--bg1);}
.steps-wrap{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--s4);position:relative;}
.steps-wrap::before{content:'';position:absolute;top:36px;left:calc(16.66% + 28px);right:calc(16.66% + 28px);height:1px;background:linear-gradient(90deg,transparent,rgba(0,87,255,.5),transparent);}
.step-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r3);padding:var(--s4);text-align:center;position:relative;transition:all .3s;}
.step-card:hover{border-color:rgba(0,87,255,.3);box-shadow:0 8px 40px rgba(0,87,255,.1);}
.step-num{width:64px;height:64px;background:var(--grad-blue);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto var(--s3);font-family:'Orbitron',sans-serif;font-size:20px;font-weight:900;color:#fff;box-shadow:0 0 30px rgba(0,87,255,.5);}
.step-emoji{font-size:26px;margin-bottom:var(--s2);}
.step-card h3{font-family:'Geologica',sans-serif;font-weight:700;font-size:19px;margin-bottom:var(--s2);}
.step-card p{color:var(--t2);font-size:14px;line-height:1.7;}
