<script>
// ── UTM & SOURCE TRACKING ─────────────────────────────────────────────────
(function(){
  // 1. Зчитуємо UTM з поточного URL
  var params = new URLSearchParams(window.location.search);
  var utmFields = ['utm_source','utm_medium','utm_campaign','utm_content','utm_term'];
  var stored = {};
  try { stored = JSON.parse(sessionStorage.getItem('picsell_utm') || '{}'); } catch(e){}

  // Якщо в URL є хоч один UTM — перезаписуємо sessionStorage
  var hasUtm = utmFields.some(function(f){ return params.get(f); });
  if(hasUtm){
    utmFields.forEach(function(f){ if(params.get(f)) stored[f] = params.get(f); });
    try { sessionStorage.setItem('picsell_utm', JSON.stringify(stored)); } catch(e){}
  }

  // 2. Визначаємо джерело через referrer (якщо UTM немає)
  function getSource(){
    var s = stored.utm_source || '';
    if(s) return s;
    var ref = document.referrer || '';
    if(!ref) return 'direct';
    if(ref.indexOf('google') !== -1) return 'google';
    if(ref.indexOf('bing') !== -1 || ref.indexOf('yahoo') !== -1) return 'bing/yahoo';
    if(ref.indexOf('linkedin') !== -1) return 'linkedin';
    if(ref.indexOf('facebook') !== -1 || ref.indexOf('fb.com') !== -1) return 'facebook';
    if(ref.indexOf('instagram') !== -1) return 'instagram';
    if(ref.indexOf('twitter') !== -1 || ref.indexOf('x.com') !== -1) return 'twitter';
    if(ref.indexOf('t.me') !== -1 || ref.indexOf('telegram') !== -1) return 'telegram';
    try { var d = new URL(ref).hostname; return d || 'referral'; } catch(e){ return 'referral'; }
  }

  // 3. Перед відправкою кожної форми — додаємо hidden поля з UTM
  function injectUtmFields(form){
    var src = getSource();
    var medium = stored.utm_medium || (document.referrer ? 'referral' : 'direct');
    var campaign = stored.utm_campaign || '';
    var landingPage = sessionStorage.getItem('picsell_landing') || window.location.pathname;

    var fields = {
      'utm_source': src,
      'utm_medium': medium,
      'utm_campaign': campaign,
      'landing_page': landingPage
    };
    if(stored.utm_content) fields['utm_content'] = stored.utm_content;
    if(stored.utm_term) fields['utm_term'] = stored.utm_term;

    Object.keys(fields).forEach(function(key){
      if(!form.querySelector('input[name="' + key + '"]')){
        var inp = document.createElement('input');
        inp.type = 'hidden';
        inp.name = key;
        inp.value = fields[key];
        form.appendChild(inp);
      }
    });
  }

  // Зберігаємо першу сторінку входу (landing page)
  if(!sessionStorage.getItem('picsell_landing')){
    try { sessionStorage.setItem('picsell_landing', window.location.pathname); } catch(e){}
  }

  // Вішаємо inject на всі форми перед submit
  document.querySelectorAll('form').forEach(function(form){
    form.addEventListener('submit', function(){ injectUtmFields(form); }, true);
  });
})();
// ── END UTM TRACKING ──────────────────────────────────────────────────────

(function(){
  if(typeof gtag !== 'function') return;

  // ── 1. PHONE CLICKS ─────────────────────────────────────────
  document.querySelectorAll('a[href^="tel:"]').forEach(function(el){
    el.addEventListener('click', function(){
      gtag('event', 'phone_click', {
        'event_category': 'engagement',
        'event_label': el.getAttribute('href').replace('tel:',''),
        'value': 1
      });
    });
  });

  // ── 2. CTA BUTTON CLICKS ("Замовити демо" / "Book Demo") ────
  document.querySelectorAll('a[href*="/demo/"], .btn-p').forEach(function(el){
    el.addEventListener('click', function(){
      gtag('event', 'cta_click', {
        'event_category': 'engagement',
        'event_label': el.innerText.trim().substring(0,50),
        'page_location': window.location.href
      });
    });
  });

  // ── 3. DEMO FORM SUBMIT ──────────────────────────────────────
  var demoForm = document.getElementById('demoForm');
  if(demoForm){
    demoForm.addEventListener('submit', function(){
      gtag('event', 'generate_lead', {
        'event_category': 'conversion',
        'event_label': 'demo_request',
        'value': 1,
        'currency': 'USD'
      });
    });
  }

  // ── 4. HOMEPAGE FORM SUBMIT ──────────────────────────────────
  var mainForm = document.getElementById('mainForm');
  if(mainForm){
    mainForm.addEventListener('submit', function(){
      gtag('event', 'generate_lead', {
        'event_category': 'conversion',
        'event_label': 'homepage_demo',
        'value': 1,
        'currency': 'USD'
      });
    });
  }

  // ── 5. BLOG SUBSCRIBE ────────────────────────────────────────
  var subForm = document.querySelector('form[name="subscribe"]');
  if(subForm){
    subForm.addEventListener('submit', function(){
      gtag('event', 'sign_up', {
        'event_category': 'engagement',
        'event_label': 'blog_subscribe'
      });
    });
  }

  // ── 6. EMAIL CLICKS ──────────────────────────────────────────
  document.querySelectorAll('a[href^="mailto:"]').forEach(function(el){
    el.addEventListener('click', function(){
      gtag('event', 'email_click', {
        'event_category': 'engagement',
        'event_label': el.getAttribute('href').replace('mailto:','')
      });
    });
  });

  // ── 7. SCROLL DEPTH (25/50/75/100%) ─────────────────────────
  var scrollDepths = [25, 50, 75, 100];
  var scrollFired = {};
  window.addEventListener('scroll', function(){
    var scrollPct = Math.round((window.scrollY / (document.documentElement.scrollHeight - window.innerHeight)) * 100);
    scrollDepths.forEach(function(depth){
      if(scrollPct >= depth && !scrollFired[depth]){
        scrollFired[depth] = true;
        gtag('event', 'scroll_depth', {
          'event_category': 'engagement',
          'event_label': depth + '%',
          'non_interaction': true
        });
      }
    });
  }, {passive: true});

  // ── 8. SOCIAL MEDIA CLICKS ───────────────────────────────────
  var socialMap = {
    'linkedin.com': 'linkedin',
    'x.com': 'twitter',
    'twitter.com': 'twitter',
    'instagram.com': 'instagram',
    't.me': 'telegram'
  };
  document.querySelectorAll('a[href]').forEach(function(el){
    var href = el.getAttribute('href') || '';
    Object.keys(socialMap).forEach(function(domain){
      if(href.indexOf(domain) !== -1){
        el.addEventListener('click', function(){
          gtag('event', 'social_click', {
            'event_category': 'engagement',
            'event_label': socialMap[domain],
            'page_location': window.location.href
          });
        });
      }
    });
  });

  // ── 9. PRICING PAGE CLICKS ───────────────────────────────────
  document.querySelectorAll('a[href*="/pricing/"]').forEach(function(el){
    el.addEventListener('click', function(){
      gtag('event', 'pricing_click', {
        'event_category': 'engagement',
        'event_label': el.innerText.trim().substring(0,50),
        'page_location': window.location.href
      });
    });
  });

  // ── 10. OUTBOUND LINKS ───────────────────────────────────────
  document.querySelectorAll('a[href^="http"]').forEach(function(el){
    if(el.hostname && el.hostname !== window.location.hostname){
      el.addEventListener('click', function(){
        gtag('event', 'outbound_click', {
          'event_category': 'engagement',
          'event_label': el.href,
          'non_interaction': false
        });
      });
    }
  });

  // ── 11. VIDEO / DEMO WATCH ───────────────────────────────────
  document.querySelectorAll('a[href*="youtube"], a[href*="youtu.be"], button[data-video]').forEach(function(el){
    el.addEventListener('click', function(){
      gtag('event', 'video_click', {
        'event_category': 'engagement',
        'event_label': el.getAttribute('href') || el.getAttribute('data-video') || 'video'
      });
    });
  });

})();
</script>
