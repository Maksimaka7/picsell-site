{{ define "head-extra" }}
<style>
.core-prose{color:var(--t2);font-size:17px;line-height:1.75;}
.core-prose h2{font-family:'Geologica',sans-serif;font-weight:800;font-size:clamp(22px,3vw,30px);color:var(--t1);margin:var(--s5) 0 var(--s3);}
.core-prose p{margin-bottom:var(--s3);}
.core-prose ul{display:flex;flex-direction:column;gap:12px;margin:0 0 var(--s3);}
.core-prose ul li{position:relative;padding-left:26px;}
.core-prose ul li::before{content:'';position:absolute;left:0;top:9px;width:9px;height:9px;border-radius:50%;background:var(--blue);}
.core-prose strong{color:var(--t1);font-weight:700;}
</style>
{{ end }}

{{ define "main" }}
{{ $en := strings.HasPrefix .RelPermalink "/en/" }}
<section class="section" style="padding-top:128px;">
  <div class="container" style="max-width:860px;">
    <span class="tag">Core</span>
    <h1 style="font-size:clamp(32px,5vw,52px);font-weight:900;line-height:1.12;letter-spacing:-.02em;margin:14px 0 18px;">{{ .Title }}</h1>
    <div class="core-prose">
      {{ .Content }}
    </div>
    <div style="margin-top:var(--s5);display:flex;gap:12px;flex-wrap:wrap;">
      <a href="{{ "/demo/" | relLangURL }}" class="btn btn-p">{{ if $en }}Book a demo →{{ else }}Замовити демо →{{ end }}</a>
      <a href="{{ "/" | relLangURL }}" class="btn btn-g">{{ if $en }}← Home{{ else }}← На головну{{ end }}</a>
    </div>
  </div>
</section>
{{ end }}
