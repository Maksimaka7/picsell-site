baseURL = "https://picsell.ai/"
title = "PICSELL"
enableRobotsTXT = true
enableEmoji = true

defaultContentLanguage = "uk"
defaultContentLanguageInSubdir = false

[languages]
  [languages.uk]
    languageName = "Українська"
    languageCode = "uk"
    weight = 1
    title = "PICSELL — AI-платформа для FMCG"
    [languages.uk.params]
      description = "Vision AI + SFA + HoReCa Intelligence для виробників і дистриб'юторів FMCG"
  [languages.en]
    languageName = "English"
    languageCode = "en"
    weight = 2
    title = "PICSELL — AI Platform for FMCG"
    [languages.en.params]
      description = "Vision AI + SFA + HoReCa Intelligence for FMCG brands and distributors"

[params]
  domain = "picsell.ai"
  email = "hello@picsell.ai"
  ogImage = "/images/og-default.png"

[sitemap]
  changefreq = "weekly"
  priority = 0.5

[outputFormats]
  [outputFormats.redirects]
    baseName = "_redirects"
    isPlainText = true
    notAlternative = true

[outputs]
  home = ["HTML", "redirects"]

[taxonomies]
